<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instagram PFP Design - Between Japan and You</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500&family=Playfair+Display:ital@1&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --jp-red: #BC002D;
            --bg-white: #FFFFFF;
            --text-dark: #1A1A1A;
        }

        body {
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background-color: #f0f0f0;
            font-family: 'Outfit', sans-serif;
        }

        .container {
            background: white;
            padding: 4rem;
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            text-align: center;
        }

        h1 {
            font-weight: 300;
            color: var(--text-dark);
            margin-bottom: 2rem;
        }

        .pfp-wrapper {
            position: relative;
            width: 400px;
            height: 400px;
            margin: 0 auto 2rem;
        }

        /* The actual profile picture design */
        .pfp-circle {
            width: 100%;
            height: 100%;
            background-color: var(--bg-white);
            border-radius: 50%;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            box-shadow: inset 0 0 0 10px var(--jp-red);
        }

        .zen-image {
            width: 85%;
            height: 85%;
            border-radius: 50%;
            object-fit: cover;
            filter: grayscale(100%) contrast(1.1);
            opacity: 0.9;
        }

        .logo-text {
            position: absolute;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .logo-text svg {
            width: 100%;
            height: 100%;
            fill: var(--jp-red);
        }

        .text-path {
            font-family: 'Outfit', sans-serif;
            font-size: 24px;
            font-weight: 500;
            letter-spacing: 4px;
            text-transform: uppercase;
        }

        .flag-accent {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 90%;
            height: 90%;
            border: 2px solid var(--jp-red);
            border-radius: 50%;
            pointer-events: none;
        }

        .controls {
            margin-top: 2rem;
            color: #666;
            font-size: 0.9rem;
        }

        .v-label {
            margin-top: 1rem;
            color: #999;
            font-size: 0.7rem;
            letter-spacing: 2px;
            text-transform: uppercase;
        }
    </style>
</head>

<body>

    <div class="container">
        <div class="pfp-wrapper">
            <div class="pfp-circle">
                <!-- Main Image -->
                <img src="/Users/shimizutaiga/.gemini/antigravity/brain/db90e4f5-51b1-4c14-a3a9-983a12591998/pfp_zen_minimalist_1772524213813.png"
                    alt="" class="zen-image">

                <!-- Logo Typography -->
                <div class="logo-text">
                    <svg viewBox="0 0 400 400">
                        <defs>
                            <!-- Paths for text -->
                            <path id="top-path" d="M 50, 200 a 150,150 0 1,1 300,0" fill="transparent" />
                            <path id="bottom-path" d="M 50, 200 a 150,150 0 1,0 300,0" fill="transparent" />
                        </defs>
                        <text class="text-path">
                            <textPath href="#top-path" startOffset="50%" text-anchor="middle">
                                BETWEEN JAPAN AND YOU
                            </textPath>
                        </text>
                        <text class="text-path">
                            <!-- Using dominant-baseline and a fixed path for better bottom alignment -->
                            <textPath href="#bottom-path" startOffset="50%" text-anchor="middle"
                                dominant-baseline="text-after-edge">
                                WHERE JAPAN MEETS YOU
                            </textPath>
                        </text>
                    </svg>
                </div>

                <div class="flag-accent"></div>
            </div>
        </div>

        <div class="v-label">v2.0 - Final Alignment</div>
    </div>

</body>

</html>
